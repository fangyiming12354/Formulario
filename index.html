<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Campos en Formularios HTML</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form class="form-tipos-inputs">
        <div class="input-demo">
            <label for="text">Correo electrónico</label>
            <input type="text" id="text" name="text" placeholder="Antonio">
            <small>Evita usar suedonimos, tiene que ser un nombre real y serio.</small>
        </div>
        <div class="input-demo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            <small>Compruebe que el correo electrónico sea válido y personal.</small>
        </div>
        <div class="input-select">
                <label for="select">Categoría de sugerencia</label>
                <select id="select" name="select" required>
                    <option value="">Selecciona una categoría</option>
                    <option value="mejora">Contenido</option>
                    <option value="servicio">Servicio</option>
                    <option value="otro">Otro</option>
                </select>
                <small>Elige la categoría que mejor describa tu sugerencia.</small>
        </div>
        <div class="input-demo">
                <label for="textarea">Sugerencias</label>
                <textarea id="textarea" name="textarea" placeholder="Escribe aquí tus sugerencias..."></textarea>
                <small>Describe con claridad y precisión tus sugerencias.</small>
        </div>
        <div class="input-radio">
            <label>Calificación de tu experiencia</label>
                <div class="rating">
                    <input type="radio" id="star-1" name="star-radio" value="star-1">
                    <label for="star-1">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path pathLength="360" d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"></path></svg>
                    </label>
                    <input type="radio" id="star-2" name="star-radio" value="star-1">
                    <label for="star-2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path pathLength="360" d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"></path></svg>
                    </label>
                    <input type="radio" id="star-3" name="star-radio" value="star-1">
                    <label for="star-3">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path pathLength="360" d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"></path></svg>
                    </label>
                    <input type="radio" id="star-4" name="star-radio" value="star-1">
                    <label for="star-4">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path pathLength="360" d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"></path></svg>
                    </label>
                    <input type="radio" id="star-5" name="star-radio" value="star-1">
                    <label for="star-5">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path pathLength="360" d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"></path></svg>
                    </label>
            </div>
        </div>
        <div class="input-demo">
            <label for="text">Comentarios adicionales</label>
            <input type="text" id="text" name="text" placeholder="Escribe tus comentarios aquí..." required>
            <small>Comparte cualquier comentario adicional sobre tu experiencia.</small>
        </div>
        <div class="result">
            <button type="submit" class="button-submit">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="svgIcon1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                </svg>
            </button>
        </div>
        <div class="result">
            <button type="reset" class="button-reset">
                <svg viewBox="0 0 448 512" class="svgIcon2"><path d="M135.2 17.7L128 32H32C14.3 32 0 46.3 0 64S14.3 96 32 96H416c17.7 0 32-14.3 32-32s-14.3-32-32-32H320l-7.2-14.3C307.4 6.8 296.3 0 284.2 0H163.8c-12.1 0-23.2 6.8-28.6 17.7zM416 128H32L53.2 467c1.6 25.3 22.6 45 47.9 45H346.9c25.3 0 46.3-19.7 47.9-45L416 128z"></path></svg>
            </button>
        </div>
    </form>
</body>
</html>
